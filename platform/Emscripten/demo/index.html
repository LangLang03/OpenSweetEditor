<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetEditor WebAssembly Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SweetEditor - WebAssembly Demo</h1>
            <div class="controls">
                <button id="btnUndo" title="Undo (Ctrl+Z)">Undo</button>
                <button id="btnRedo" title="Redo (Ctrl+Y)">Redo</button>
                <button id="btnWrap" title="Toggle Word Wrap">Wrap</button>
                <button id="btnClear" title="Clear All Decorations">Clear</button>
            </div>
        </header>
        <main>
            <canvas id="editor" tabindex="0"></canvas>
        </main>
        <footer>
            <div class="status">
                <span id="statusLine">Line: 1, Column: 1</span>
                <span id="statusInfo">Ready</span>
            </div>
        </footer>
    </div>
    
    <script type="module">
        // Import from compiled TypeScript output
        import { SweetEditor, CanvasRenderer, EventType, Modifier, WrapMode } from './dist/index.js';
        // Import WebAssembly module
        import Module from './dist/sweeteditor-wasm.js';
        
        class CanvasTextMeasurer {
            constructor(ctx, fontSpec) {
                this.ctx = ctx;
                this.fontSpec = fontSpec;
                this.ctx.font = fontSpec;
                
                const metrics = this.ctx.measureText('Ag');
                this.ascent = metrics.actualBoundingBoxAscent || 12;
                this.descent = metrics.actualBoundingBoxDescent || 4;
            }
            
            measureTextWidth(text, fontStyle) {
                this.ctx.font = this.getFont(fontStyle);
                return this.ctx.measureText(text).width;
            }
            
            measureInlayHintWidth(text) {
                this.ctx.font = this.fontSpec.replace(/\d+px/, '12px');
                return this.ctx.measureText(text).width;
            }
            
            measureIconWidth(iconId) {
                return 16;
            }
            
            getFontMetrics() {
                return {
                    ascent: -this.ascent,
                    descent: this.descent
                };
            }
            
            getFont(fontStyle) {
                const base = this.fontSpec;
                let style = '';
                if (fontStyle & 1) style += 'bold ';
                if (fontStyle & 2) style += 'italic ';
                return `${style}${base}`;
            }
        }
        
        const sampleCode = `#include <iostream>
#include <vector>
#include <string>

// SweetEditor WebAssembly Demo
// A high-performance code editor core compiled to WebAssembly

namespace SweetEditor {

class TextBuffer {
public:
    TextBuffer() : m_content() {}
    
    void insert(size_t position, const std::string& text) {
        m_content.insert(position, text);
    }
    
    void erase(size_t start, size_t end) {
        m_content.erase(start, end - start);
    }
    
    const std::string& content() const {
        return m_content;
    }
    
    size_t length() const {
        return m_content.length();
    }

private:
    std::string m_content;
};

class Editor {
public:
    Editor() : m_buffer(), m_cursor(0) {}
    
    void insertText(const std::string& text) {
        m_buffer.insert(m_cursor, text);
        m_cursor += text.length();
    }
    
    void deleteCharacter() {
        if (m_cursor > 0) {
            m_buffer.erase(m_cursor - 1, m_cursor);
            m_cursor--;
        }
    }
    
    void moveCursor(int delta) {
        int newPos = static_cast<int>(m_cursor) + delta;
        m_cursor = std::clamp(newPos, 0, static_cast<int>(m_buffer.length()));
    }

private:
    TextBuffer m_buffer;
    size_t m_cursor;
};

} // namespace SweetEditor

int main() {
    SweetEditor::Editor editor;
    editor.insertText("Hello, World!");
    std::cout << "Editor initialized" << std::endl;
    return 0;
}
`;

        async function init() {
            const canvas = document.getElementById('editor');
            const ctx = canvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            function resizeCanvas() {
                const rect = canvas.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
            }
            
            const measurer = new CanvasTextMeasurer(ctx, '14px Menlo, Monaco, monospace');
            
            let editor, renderer;
            
            try {
                // Wait for WebAssembly module to be ready
                await new Promise((resolve, reject) => {
                    if (Module._malloc) {
                        resolve();
                    } else {
                        Module.onRuntimeInitialized = resolve;
                    }
                });
                
                editor = SweetEditor.create({
                    touchSlop: 10,
                    doubleTapTimeout: 300,
                    longPressMs: 500
                }, measurer, Module);
                
                editor.setViewport(canvas.getBoundingClientRect().width, canvas.getBoundingClientRect().height);
                editor.loadDocument(sampleCode);
                
                renderer = new CanvasRenderer(canvas, editor);
                
                document.getElementById('statusInfo').textContent = 'WASM Loaded';
            } catch (error) {
                console.error('Failed to initialize editor:', error);
                document.getElementById('statusInfo').textContent = 'Error: ' + error.message;
                return;
            }
            
            let needsRender = true;
            
            function render() {
                if (needsRender) {
                    renderer.render();
                    needsRender = false;
                }
                requestAnimationFrame(render);
            }
            render();
            
            function updateStatus() {
                const pos = editor.getCursorPosition();
                document.getElementById('statusLine').textContent = 
                    `Line: ${pos.line + 1}, Column: ${pos.column + 1}`;
            }
            
            function handleGestureResult(result) {
                if (result) {
                    needsRender = true;
                    updateStatus();
                }
            }
            
            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const result = editor.handleGestureEvent(EventType.MOUSE_DOWN, [{ x, y }]);
                handleGestureResult(result);
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (e.buttons === 1) {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const result = editor.handleGestureEvent(EventType.MOUSE_MOVE, [{ x, y }]);
                    handleGestureResult(result);
                }
            });
            
            canvas.addEventListener('mouseup', (e) => {
                const result = editor.handleGestureEvent(EventType.MOUSE_UP, []);
                handleGestureResult(result);
            });
            
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const result = editor.handleGestureEventEx(
                    EventType.MOUSE_WHEEL,
                    [{ x, y }],
                    Modifier.NONE,
                    e.deltaX,
                    e.deltaY,
                    1
                );
                handleGestureResult(result);
            });
            
            let edgeScrollInterval = null;
            
            function startEdgeScroll() {
                if (edgeScrollInterval) return;
                edgeScrollInterval = setInterval(() => {
                    const result = editor.tickEdgeScroll();
                    if (result && !result.needsEdgeScroll) {
                        stopEdgeScroll();
                    }
                    handleGestureResult(result);
                }, 16);
            }
            
            function stopEdgeScroll() {
                if (edgeScrollInterval) {
                    clearInterval(edgeScrollInterval);
                    edgeScrollInterval = null;
                }
            }
            
            canvas.addEventListener('keydown', (e) => {
                let modifiers = Modifier.NONE;
                if (e.shiftKey) modifiers |= Modifier.SHIFT;
                if (e.ctrlKey || e.metaKey) modifiers |= Modifier.CTRL;
                if (e.altKey) modifiers |= Modifier.ALT;
                
                if (e.ctrlKey || e.metaKey) {
                    switch (e.key.toLowerCase()) {
                        case 'z':
                            e.preventDefault();
                            if (e.shiftKey) {
                                handleGestureResult(editor.redo());
                            } else {
                                handleGestureResult(editor.undo());
                            }
                            return;
                        case 'y':
                            e.preventDefault();
                            handleGestureResult(editor.redo());
                            return;
                        case 'a':
                            e.preventDefault();
                            editor.selectAll();
                            needsRender = true;
                            return;
                        case 'c':
                            return;
                        case 'v':
                            return;
                        case 'x':
                            return;
                    }
                }
                
                if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
                    e.preventDefault();
                    const result = editor.insertText(e.key);
                    handleGestureResult(result);
                } else {
                    switch (e.key) {
                        case 'Enter':
                            e.preventDefault();
                            handleGestureResult(editor.insertText('\n'));
                            break;
                        case 'Backspace':
                            e.preventDefault();
                            handleGestureResult(editor.backspace());
                            break;
                        case 'Delete':
                            e.preventDefault();
                            handleGestureResult(editor.deleteForward());
                            break;
                        case 'ArrowLeft':
                            e.preventDefault();
                            editor.moveCursorLeft(e.shiftKey);
                            needsRender = true;
                            updateStatus();
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            editor.moveCursorRight(e.shiftKey);
                            needsRender = true;
                            updateStatus();
                            break;
                        case 'ArrowUp':
                            e.preventDefault();
                            editor.moveCursorUp(e.shiftKey);
                            needsRender = true;
                            updateStatus();
                            break;
                        case 'ArrowDown':
                            e.preventDefault();
                            editor.moveCursorDown(e.shiftKey);
                            needsRender = true;
                            updateStatus();
                            break;
                        case 'Home':
                            e.preventDefault();
                            editor.moveCursorToLineStart(e.shiftKey);
                            needsRender = true;
                            updateStatus();
                            break;
                        case 'End':
                            e.preventDefault();
                            editor.moveCursorToLineEnd(e.shiftKey);
                            needsRender = true;
                            updateStatus();
                            break;
                        case 'PageUp':
                            e.preventDefault();
                            for (let i = 0; i < 10; i++) editor.moveCursorUp(e.shiftKey);
                            needsRender = true;
                            updateStatus();
                            break;
                        case 'PageDown':
                            e.preventDefault();
                            for (let i = 0; i < 10; i++) editor.moveCursorDown(e.shiftKey);
                            needsRender = true;
                            updateStatus();
                            break;
                        case 'Tab':
                            e.preventDefault();
                            handleGestureResult(editor.insertText('    '));
                            break;
                    }
                }
            });
            
            canvas.addEventListener('compositionstart', () => {
                editor.compositionStart();
            });
            
            canvas.addEventListener('compositionupdate', (e) => {
                editor.compositionUpdate(e.data);
                needsRender = true;
            });
            
            canvas.addEventListener('compositionend', (e) => {
                const result = editor.compositionEnd(e.data);
                handleGestureResult(result);
            });
            
            canvas.addEventListener('focus', () => {
                document.body.classList.add('editor-focused');
            });
            
            canvas.addEventListener('blur', () => {
                document.body.classList.remove('editor-focused');
            });
            
            document.getElementById('btnUndo').addEventListener('click', () => {
                handleGestureResult(editor.undo());
            });
            
            document.getElementById('btnRedo').addEventListener('click', () => {
                handleGestureResult(editor.redo());
            });
            
            let wrapMode = WrapMode.NONE;
            document.getElementById('btnWrap').addEventListener('click', () => {
                wrapMode = wrapMode === WrapMode.NONE ? WrapMode.WORD_BREAK : WrapMode.NONE;
                editor.setWrapMode(wrapMode);
                needsRender = true;
            });
            
            document.getElementById('btnClear').addEventListener('click', () => {
                editor.clearAllDecorations();
                needsRender = true;
            });
            
            canvas.focus();
            updateStatus();
        }
        
        init().catch(console.error);
    </script>
</body>
</html>
